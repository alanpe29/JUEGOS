<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS Store - Digital Games</title>
    <style>
        :root {
            --ps-blue: #003087;
            --ps-light-blue: #0070d1;
            --dark-bg: #0a0a0a;
            --card-bg: #1a1a1a;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: radial-gradient(circle at top, #00439c 0%, #0a0a0a 100%);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--ps-light-blue);
            margin-bottom: 30px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .game-card-small {
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid transparent;
            text-align: center;
        }

        .game-card-small:hover {
            transform: scale(1.05);
            border-color: var(--ps-light-blue);
        }

        .game-card-small img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        .game-title {
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
        }

        /* Modales y Overlays */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 999;
        }

        .modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #111;
            padding: 25px;
            border-radius: 15px;
            border: 2px solid var(--ps-light-blue);
            z-index: 1000;
            width: 320px;
            text-align: center;
        }

        .step-title { color: var(--ps-light-blue); margin-bottom: 20px; font-size: 18px; }

        .option-btn {
            background: #222;
            border: 1px solid #444;
            color: white;
            padding: 15px;
            margin: 10px 0;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }

        .option-btn:hover:not(:disabled) { background: var(--ps-light-blue); }
        .option-btn:disabled { opacity: 0.5; cursor: not-allowed; border-color: #e74c3c; }

        .price { color: #2ecc71; }
        .no-stock { color: #e74c3c; font-size: 12px; }

        .btn-back {
            background: none;
            border: 1px solid #666;
            color: #aaa;
            margin-top: 15px;
            padding: 8px;
            width: 100%;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<header>
    <h1>PLAYSTATION DIGITAL STORE</h1>
</header>

<div class="games-grid">
    <!-- EA SPORTS FC 26 -->
    <div class="game-card-small" onclick="openStep1('FC 26', 35000, 0)">
        <img src="https://assets.nintendo.com/image/upload/ar_16:9,c_lpad,w_1240/b_white/f_auto/q_auto/store/software/switch/70010000091347/a4ce113ce08d7c7a94e50dc5104ea74a90fcb3c7d6b465fb8a1524b3df012e09" alt="FC 26">
        <div class="game-title">EA SPORTS FC 26</div>
    </div>

    <!-- RESIDENT EVIL 2 REMAKE -->
    <div class="game-card-small" onclick="openStep1('Resident Evil 2', 15000, 0)">
        <img src="https://image.api.playstation.com/vulcan/ap/rnd/202206/0204/uDFoGvnMTTCLVmTwjj0njGWC.png" alt="RE2 Remake">
        <div class="game-title">RESIDENT EVIL 2 REMAKE</div>
    </div>
</div>

<div id="overlay" class="overlay" onclick="closeAll()"></div>

<!-- PASO 1: SELECCIONAR CONSOLA -->
<div id="modal-step1" class="modal">
    <div class="step-title" id="title-s1">Juego</div>
    <p>Selecciona tu consola:</p>
    <button class="option-btn" onclick="openStep2('PS4')">PLAYSTATION 4</button>
    <button class="option-btn" onclick="openStep2('PS5')">PLAYSTATION 5</button>
    <button class="btn-back" onclick="closeAll()">CANCELAR</button>
</div>

<!-- PASO 2: SELECCIONAR CUENTA -->
<div id="modal-step2" class="modal">
    <div class="step-title" id="title-s2">Tipo de Cuenta</div>
    <p id="selected-console-text" style="font-size: 12px; color: #aaa;"></p>
    
    <button class="option-btn" id="btn-primaria">
        <span>Primaria</span>
        <span class="price" id="txt-primaria"></span>
    </button>
    
    <button class="option-btn" id="btn-secundaria" disabled>
        <span>Secundaria</span>
        <span class="no-stock">SIN STOCK</span>
    </button>

    <button class="btn-back" onclick="backToStep1()">VOLVER</button>
</div>

<script>
    let currentGame = "";
    let pricePrimaria = 0;

    function openStep1(name, pPrimaria) {
        currentGame = name;
        pricePrimaria = pPrimaria;
        document.getElementById('title-s1').innerText = name;
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('modal-step1').style.display = 'block';
    }

    function openStep2(consoleName) {
        document.getElementById('modal-step1').style.display = 'none';
        document.getElementById('modal-step2').style.display = 'block';
        document.getElementById('title-s2').innerText = currentGame;
        document.getElementById('selected-console-text').innerText = "Versión: " + consoleName;
        document.getElementById('txt-primaria').innerText = "$" + pricePrimaria.toLocaleString();
    }

    function backToStep1() {
        document.getElementById('modal-step2').style.display = 'none';
        document.getElementById('modal-step1').style.display = 'block';
    }

    function closeAll() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('modal-step1').style.display = 'none';
        document.getElementById('modal-step2').style.display = 'none';
    }
</script>

</body>
</html>
