<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS Store - Digital Games</title>
    <style>
        :root {
            --ps-blue: #003087;
            --ps-light-blue: #0070d1;
            --dark-bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --accent: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: radial-gradient(circle at top, #00439c 0%, #0a0a0a 100%);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--ps-light-blue);
            margin-bottom: 30px;
        }

        /* Contenedor de la cuadrícula */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Tarjeta pequeña del juego */
        .game-card-small {
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s, border-color 0.3s;
            border: 2px solid transparent;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .game-card-small:hover {
            transform: scale(1.05);
            border-color: var(--ps-light-blue);
        }

        /* Ajuste para que la imagen horizontal encaje en el cuadro vertical */
        .game-card-small img {
            width: 100%;
            height: 230px; /* Altura fija para mantener uniformidad */
            object-fit: cover; /* Recorta los bordes para que no se estire */
            display: block;
        }

        .game-title {
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            background: rgba(0,0,0,0.6);
        }

        /* Modal / Ventana de opciones */
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #151515;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid var(--ps-light-blue);
            z-index: 1000;
            width: 300px;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 999;
        }

        .option-box {
            background: #222;
            margin: 10px 0;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #333;
        }

        .price-tag { color: #2ecc71; font-weight: bold; font-size: 18px; }
        .no-stock { color: #e74c3c; font-weight: bold; font-size: 12px; text-transform: uppercase; }

        .btn-close {
            background: var(--ps-light-blue);
            border: none;
            color: white;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <h1>PLAYSTATION DIGITAL STORE</h1>
</header>

<div class="games-grid">
    <!-- JUEGO: EA SPORTS FC 26 -->
    <div class="game-card-small" onclick="openOptions('fc26')">
        <img src="https://assets.nintendo.com/image/upload/ar_16:9,c_lpad,w_1240/b_white/f_auto/q_auto/store/software/switch/70010000091347/a4ce113ce08d7c7a94e50dc5104ea74a90fcb3c7d6b465fb8a1524b3df012e09" alt="EA SPORTS FC 26">
        <div class="game-title">EA SPORTS FC 26</div>
    </div>

    <!-- Acá podés ir agregando más juegos siguiendo el mismo formato -->
</div>

<!-- Estructura del Modal -->
<div id="overlay" class="overlay" onclick="closeOptions()"></div>
<div id="modal" class="modal">
    <h3 id="modal-title" style="margin-top:0; color: var(--ps-light-blue);">Selecciona el tipo de cuenta</h3>
    
    <div class="option-box">
        <span>Primaria</span>
        <span class="price-tag" id="price-primaria">$35.000</span>
    </div>

    <div class="option-box">
        <span>Secundaria</span>
        <span id="price-secundaria" class="no-stock">SIN STOCK</span>
    </div>

    <button class="btn-close" onclick="closeOptions()">VOLVER</button>
</div>

<script>
    function openOptions(game) {
        document.getElementById('modal').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
        
        if(game === 'fc26') {
            document.getElementById('modal-title').innerText = "EA SPORTS FC 26";
            document.getElementById('price-primaria').innerText = "$35.000";
            document.getElementById('price-secundaria').innerText = "SIN STOCK";
        }
    }

    function closeOptions() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }
</script>

</body>
</html>
